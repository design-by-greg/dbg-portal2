<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBG Portal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
body { background: #f4f5f7; min-height: 100vh; }
.portal { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; background: white; padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid #e5e7eb; }
.logo { font-size: 20px; font-weight: 600; color: #111; }
.logo span { color: #2563eb; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; }
.badge-green { background: #dcfce7; color: #166534; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-blue { background: #dbeafe; color: #1e40af; }
.badge-amber { background: #fef3c7; color: #92400e; }
.config-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; }
.config-card h3 { font-size: 12px; font-weight: 600; color: #6b7280; letter-spacing: 0.05em; margin-bottom: 12px; }
.config-row { display: flex; gap: 8px; }
.config-row input { flex: 1; padding: 9px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; color: #111; }
.btn { padding: 9px 18px; border-radius: 8px; border: 1px solid #e5e7eb; background: white; color: #111; cursor: pointer; font-size: 14px; font-weight: 500; }
.btn:hover { background: #f9fafb; }
.btn-primary { background: #2563eb; border-color: #1d4ed8; color: white; }
.btn-primary:hover { background: #1d4ed8; }
.btn-green { background: #16a34a; border-color: #15803d; color: white; }
.btn-green:hover { background: #15803d; }
.btn-sm { padding: 5px 12px; font-size: 13px; }
.nav { display: flex; gap: 2px; margin-bottom: 1.5rem; background: white; padding: 6px; border-radius: 12px; border: 1px solid #e5e7eb; }
.nav-btn { flex: 1; padding: 8px; border: none; background: none; cursor: pointer; font-size: 14px; color: #6b7280; border-radius: 8px; font-weight: 500; }
.nav-btn.active { background: #2563eb; color: white; }
.section { display: none; }
.section.active { display: block; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.stat-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.25rem; }
.stat-label { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 600; color: #111; }
.card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.card-header h3 { font-size: 15px; font-weight: 600; color: #111; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 12px; font-weight: 500; color: #6b7280; }
.form-group input, .form-group select, .form-group textarea { padding: 9px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; color: #111; background: white; }
.form-group textarea { resize: vertical; min-height: 70px; }
.form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #f3f4f6; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; padding: 10px 12px; color: #6b7280; font-weight: 500; font-size: 12px; border-bottom: 1px solid #f3f4f6; background: #f9fafb; }
td { padding: 12px; border-bottom: 1px solid #f9fafb; color: #111; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9fafb; }
.msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.msg-success { background: #dcfce7; color: #166534; }
.msg-error { background: #fee2e2; color: #991b1b; }
.empty { text-align: center; padding: 2.5rem; color: #9ca3af; font-size: 14px; }
.form-section { border-top: 1px solid #f3f4f6; padding-top: 1rem; margin-top: 0.5rem; }
.success-banner { background: #dcfce7; color: #166534; padding: 14px 18px; border-radius: 12px; margin-bottom: 1.5rem; font-size: 14px; font-weight: 500; display: none; }
@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .config-row { flex-direction: column; }
}
</style>
</head>
<body>
<div class="portal">

  <div class="header">
    <div class="logo">DBG <span>Portal</span></div>
    <span class="badge badge-red" id="conn-status">Non connecté</span>
  </div>

  <div id="success-banner" class="success-banner">
    Paiement reçu avec succès !
  </div>

  <div class="config-card" id="config-section">
    <h3>CONNEXION SUPABASE</h3>
    <div class="config-row">
      <input type="text" id="sb-url" placeholder="https://xxxx.supabase.co" />
      <input type="text" id="sb-key" placeholder="anon public key..." />
      <button class="btn btn-primary" onclick="connectSupabase()">Connecter</button>
    </div>
    <div id="conn-msg" style="margin-top:10px;"></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showTab('dashboard', this)">Tableau de bord</button>
    <button class="nav-btn" onclick="showTab('clients', this)">Clients</button>
    <button class="nav-btn" onclick="showTab('commandes', this)">Commandes</button>
    <button class="nav-btn" onclick="showTab('catalogue', this)">Catalogue</button>
  </div>

  <div id="tab-dashboard" class="section active">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Clients</div><div class="stat-value" id="stat-clients">—</div></div>
      <div class="stat-card"><div class="stat-label">Commandes</div><div class="stat-value" id="stat-commandes">—</div></div>
      <div class="stat-card"><div class="stat-label">CA total HT</div><div class="stat-value" id="stat-ca">—</div></div>
      <div class="stat-card"><div class="stat-label">En production</div><div class="stat-value" id="stat-prod">—</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Dernières commandes</h3></div>
      <div id="last-commandes"><div class="empty">Connecte-toi pour voir les données</div></div>
    </div>
  </div>

  <div id="tab-clients" class="section">
    <div class="card">
      <div class="card-header">
        <h3>Clients</h3>
        <button class="btn btn-primary btn-sm" onclick="toggleForm('form-client')">+ Nouveau client</button>
      </div>
      <div id="form-client" style="display:none;" class="form-section">
        <div id="msg-client"></div>
        <div class="form-grid">
          <div class="form-group"><label>Nom *</label><input type="text" id="c-nom" placeholder="Dupont Marie" /></div>
          <div class="form-group"><label>Entreprise / Association</label><input type="text" id="c-entreprise" placeholder="Club sportif, société..." /></div>
          <div class="form-group"><label>Email</label><input type="email" id="c-email" placeholder="email@exemple.com" /></div>
          <div class="form-group"><label>Téléphone</label><input type="text" id="c-tel" placeholder="06 00 00 00 00" /></div>
          <div class="form-group"><label>Type de client</label>
            <select id="c-type"><option>B2B</option><option>Association</option><option>Club sportif</option><option>Particulier</option></select>
          </div>
          <div class="form-group"><label>Notes</label><input type="text" id="c-notes" placeholder="Infos utiles..." /></div>
        </div>
        <div class="form-actions">
          <button class="btn" onclick="toggleForm('form-client')">Annuler</button>
          <button class="btn btn-primary" onclick="createClient()">Enregistrer</button>
        </div>
      </div>
      <div id="clients-list"><div class="empty">Aucun client</div></div>
    </div>
  </div>

  <div id="tab-commandes" class="section">
    <div class="card">
      <div class="card-header">
        <h3>Commandes</h3>
        <button class="btn btn-primary btn-sm" onclick="toggleForm('form-commande')">+ Nouvelle commande</button>
      </div>
      <div id="form-commande" style="display:none;" class="form-section">
        <div id="msg-commande"></div>
        <div class="form-grid">
          <div class="form-group"><label>Client *</label><select id="cmd-client"><option value="">Choisir...</option></select></div>
          <div class="form-group"><label>Date de livraison</label><input type="date" id="cmd-date" /></div>
          <div class="form-group"><label>Description *</label><input type="text" id="cmd-desc" placeholder="ex: 50 t-shirts DTF logo club" /></div>
          <div class="form-group"><label>Quantité</label><input type="number" id="cmd-qty" value="1" min="1" /></div>
          <div class="form-group"><label>Prix unitaire HT (€)</label><input type="number" id="cmd-prix" value="0" step="0.01" /></div>
          <div class="form-group"><label>Statut</label>
            <select id="cmd-statut">
              <option>Nouveau</option><option>Devis envoyé</option><option>Validé</option>
              <option>En production</option><option>Livré</option><option>Payé</option>
            </select>
          </div>
          <div class="form-group full"><label>Notes</label><textarea id="cmd-notes" placeholder="Infos complémentaires..."></textarea></div>
        </div>
        <div class="form-actions">
          <button class="btn" onclick="toggleForm('form-commande')">Annuler</button>
          <button class="btn btn-primary" onclick="createCommande()">Créer la commande</button>
        </div>
      </div>
      <div id="commandes-list"><div class="empty">Aucune commande</div></div>
    </div>
  </div>

  <div id="tab-catalogue" class="section">
    <div class="card">
      <div class="card-header">
        <h3>Catalogue produits</h3>
        <button class="btn btn-primary btn-sm" onclick="toggleForm('form-catalogue')">+ Ajouter produit</button>
      </div>
      <div id="form-catalogue" style="display:none;" class="form-section">
        <div id="msg-catalogue"></div>
        <div class="form-grid">
          <div class="form-group"><label>Nom du produit *</label><input type="text" id="cat-nom" placeholder="T-shirt DTF" /></div>
          <div class="form-group"><label>Catégorie</label>
            <select id="cat-cat"><option>Textile</option><option>Print</option><option>Sticker</option><option>Carte</option><option>Autre</option></select>
          </div>
          <div class="form-group"><label>Prix de base HT (€)</label><input type="number" id="cat-prix" value="0" step="0.01" /></div>
          <div class="form-group"><label>Description</label><input type="text" id="cat-desc" placeholder="Description courte" /></div>
        </div>
        <div class="form-actions">
          <button class="btn" onclick="toggleForm('form-catalogue')">Annuler</button>
          <button class="btn btn-primary" onclick="createCatalogue()">Ajouter</button>
        </div>
      </div>
      <div id="catalogue-list"><div class="empty">Aucun produit</div></div>
    </div>
  </div>

</div>

<script src="https://js.stripe.com/v3/"></script>
<script>
let SB_URL = '', SB_KEY = '';
const STRIPE_KEY = 'pk_live_REMPLACE_PAR_TA_CLE';

if (window.location.search.includes('paiement=ok')) {
  document.getElementById('success-banner').style.display = 'block';
  setTimeout(() => { document.getElementById('success-banner').style.display = 'none'; }, 6000);
}

function connectSupabase() {
  SB_URL = document.getElementById('sb-url').value.trim().replace(/\/$/, '');
  SB_KEY = document.getElementById('sb-key').value.trim();
  if (!SB_URL || !SB_KEY) { showMsg('conn-msg', 'error', 'Remplis les deux champs.'); return; }
  fetch(SB_URL + '/rest/v1/clients?limit=1', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  }).then(r => {
    if (r.ok || r.status === 406 || r.status === 200) {
      document.getElementById('conn-status').textContent = 'Connecté';
      document.getElementById('conn-status').className = 'badge badge-green';
      document.getElementById('config-section').style.display = 'none';
      loadAll();
    } else {
      showMsg('conn-msg', 'error', 'Erreur ' + r.status + ' — vérifie tes clés.');
    }
  }).catch(e => showMsg('conn-msg', 'error', 'Impossible de joindre Supabase : ' + e.message));
}

function sbFetch(table, opts = {}) {
  let url = SB_URL + '/rest/v1/' + table;
  if (opts.query) url += '?' + opts.query;
  return fetch(url, {
    method: opts.method || 'GET',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
}

function showTab(tab, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  el.classList.add('active');
  if (SB_KEY) loadAll();
}

function toggleForm(id) {
  const f = document.getElementById(id);
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function showMsg(id, type, text) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '<div class="msg msg-' + (type === 'error' ? 'error' : 'success') + '">' + text + '</div>';
  if (type === 'success') setTimeout(() => { el.innerHTML = ''; }, 4000);
}

function statusBadge(s) {
  const map = { 'Nouveau': 'blue', 'Devis envoyé': 'amber', 'Validé': 'blue', 'En production': 'amber', 'Livré': 'green', 'Payé': 'green' };
  return '<span class="badge badge-' + (map[s] || 'blue') + '">' + s + '</span>';
}

function payerCommande(montantTtc, reference) {
  const stripe = Stripe(mk_1S51gw4754LvneMGqP1y1DsO);
  stripe.redirectToCheckout({
    lineItems: [{ price_data: { currency: 'eur', product_data: { name: 'Commande ' + reference + ' — Design by Greg' }, unit_amount: Math.round(montantTtc * 100) }, quantity: 1 }],
    mode: 'payment',
    successUrl: window.location.origin + window.location.pathname + '?paiement=ok',
    cancelUrl: window.location.href
  }).then(result => { if (result.error) alert(result.error.message); });
}

async function loadAll() {
  await loadClients();
  await loadCommandes();
  await loadCatalogue();
  await loadDashboard();
}

async function loadClients() {
  const r = await sbFetch('clients', { query: 'order=created_at.desc' });
  const data = await r.json();
  if (!Array.isArray(data)) return;
  const sel = document.getElementById('cmd-client');
  if (sel) sel.innerHTML = '<option value="">Choisir...</option>' + data.map(c => '<option value="' + c.id + '">' + c.nom + (c.entreprise ? ' — ' + c.entreprise : '') + '</option>').join('');
  const el = document.getElementById('clients-list');
  if (!el) return;
  if (data.length === 0) { el.innerHTML = '<div class="empty">Aucun client</div>'; return; }
  el.innerHTML = '<table><thead><tr><th>Nom</th><th>Entreprise</th><th>Email</th><th>Téléphone</th><th>Type</th></tr></thead><tbody>' +
    data.map(c => '<tr><td><strong>' + c.nom + '</strong></td><td>' + (c.entreprise || '—') + '</td><td>' + (c.email || '—') + '</td><td>' + (c.telephone || '—') + '</td><td>' + statusBadge(c.type_client || 'B2B') + '</td></tr>').join('') +
    '</tbody></table>';
}

async function loadCommandes() {
  const r = await sbFetch('commandes', { query: 'order=created_at.desc&select=*,clients(nom)' });
  const data = await r.json();
  if (!Array.isArray(data)) return;
  const el = document.getElementById('commandes-list');
  const el2 = document.getElementById('last-commandes');
  if (!el) return;
  if (data.length === 0) {
    el.innerHTML = '<div class="empty">Aucune commande</div>';
    if (el2) el2.innerHTML = '<div class="empty">Aucune commande</div>';
    return;
  }
  const html = '<table><thead><tr><th>Référence</th><th>Client</th><th>Statut</th><th>Total HT</th><th>Total TTC</th><th>Livraison</th><th>Paiement</th></tr></thead><tbody>' +
    data.map(c => '<tr>' +
      '<td><strong>' + (c.reference || '—') + '</strong></td>' +
      '<td>' + (c.clients?.nom || '—') + '</td>' +
      '<td>' + statusBadge(c.statut) + '</td>' +
      '<td>' + (c.total_ht ? c.total_ht.toFixed(2) + ' €' : '—') + '</td>' +
      '<td>' + (c.total_ttc ? c.total_ttc.toFixed(2) + ' €' : '—') + '</td>' +
      '<td>' + (c.date_livraison || '—') + '</td>' +
      '<td>' + (c.total_ttc > 0 && c.statut !== 'Payé' ? '<button class="btn btn-green btn-sm" onclick="payerCommande(' + c.total_ttc + ',\'' + c.reference + '\')">Payer ' + c.total_ttc.toFixed(2) + ' €</button>' : (c.statut === 'Payé' ? '<span class="badge badge-green">Payé</span>' : '—')) + '</td>' +
      '</tr>').join('') +
    '</tbody></table>';
  el.innerHTML = html;
  if (el2) el2.innerHTML = html;
}

async function loadCatalogue() {
  const r = await sbFetch('catalogue', { query: 'order=nom.asc' });
  const data = await r.json();
  if (!Array.isArray(data)) return;
  const el = document.getElementById('catalogue-list');
  if (!el) return;
  if (data.length === 0) { el.innerHTML = '<div class="empty">Aucun produit</div>'; return; }
  el.innerHTML = '<table><thead><tr><th>Produit</th><th>Catégorie</th><th>Prix HT</th><th>Statut</th></tr></thead><tbody>' +
    data.map(c => '<tr><td><strong>' + c.nom + '</strong></td><td>' + (c.categorie || '—') + '</td><td>' + (c.prix_base ? c.prix_base.toFixed(2) + ' €' : '—') + '</td><td><span class="badge ' + (c.actif ? 'badge-green' : 'badge-red') + '">' + (c.actif ? 'Actif' : 'Inactif') + '</span></td></tr>').join('') +
    '</tbody></table>';
}

async function loadDashboard() {
  const [rc, ro, rp] = await Promise.all([
    sbFetch('clients', { query: 'select=id' }),
    sbFetch('commandes', { query: 'select=statut,total_ht' }),
    sbFetch('commandes', { query: 'statut=eq.En production&select=id' })
  ]);
  const clients = await rc.json();
  const commandes = await ro.json();
  const prod = await rp.json();
  if (Array.isArray(clients)) document.getElementById('stat-clients').textContent = clients.length;
  if (Array.isArray(commandes)) {
    document.getElementById('stat-commandes').textContent = commandes.length;
    const ca = commandes.reduce((s, c) => s + (parseFloat(c.total_ht) || 0), 0);
    document.getElementById('stat-ca').textContent = ca.toFixed(0) + ' €';
  }
  if (Array.isArray(prod)) document.getElementById('stat-prod').textContent = prod.length;
}

async function createClient() {
  const nom = document.getElementById('c-nom').value.trim();
  if (!nom) { showMsg('msg-client', 'error', 'Le nom est obligatoire.'); return; }
  const body = { nom, email: document.getElementById('c-email').value, telephone: document.getElementById('c-tel').value, entreprise: document.getElementById('c-entreprise').value, type_client: document.getElementById('c-type').value, notes: document.getElementById('c-notes').value };
  const r = await sbFetch('clients', { method: 'POST', body });
  if (r.ok) {
    showMsg('msg-client', 'success', 'Client créé avec succès !');
    toggleForm('form-client');
    ['c-nom','c-email','c-tel','c-entreprise','c-notes'].forEach(id => document.getElementById(id).value = '');
    loadClients(); loadDashboard();
  } else { showMsg('msg-client', 'error', 'Erreur lors de la création.'); }
}

async function createCommande() {
  const clientId = document.getElementById('cmd-client').value;
  const desc = document.getElementById('cmd-desc').value.trim();
  if (!clientId || !desc) { showMsg('msg-commande', 'error', 'Client et description obligatoires.'); return; }
  const qty = parseInt(document.getElementById('cmd-qty').value) || 1;
  const prix = parseFloat(document.getElementById('cmd-prix').value) || 0;
  const totalHt = parseFloat((qty * prix).toFixed(2));
  const totalTtc = parseFloat((totalHt * 1.2).toFixed(2));
  const ref = 'DBG-' + Math.floor(10000 + Math.random() * 90000);
  const body = { client_id: clientId, reference: ref, statut: document.getElementById('cmd-statut').value, total_ht: totalHt, total_ttc: totalTtc, notes: document.getElementById('cmd-notes').value, date_livraison: document.getElementById('cmd-date').value || null };
  const r = await sbFetch('commandes', { method: 'POST', body });
  if (r.ok) {
    const data = await r.json();
    const cmdId = Array.isArray(data) ? data[0].id : data.id;
    if (cmdId) await sbFetch('lignes_commande', { method: 'POST', body: { commande_id: cmdId, description: desc, quantite: qty, prix_unitaire: prix, total: totalHt } });
    showMsg('msg-commande', 'success', 'Commande ' + ref + ' créée !');
    toggleForm('form-commande');
    loadCommandes(); loadDashboard();
  } else { showMsg('msg-commande', 'error', 'Erreur lors de la création.'); }
}

async function createCatalogue() {
  const nom = document.getElementById('cat-nom').value.trim();
  if (!nom) { showMsg('msg-catalogue', 'error', 'Nom obligatoire.'); return; }
  const body = { nom, categorie: document.getElementById('cat-cat').value, prix_base: parseFloat(document.getElementById('cat-prix').value) || 0, description: document.getElementById('cat-desc').value, actif: true };
  const r = await sbFetch('catalogue', { method: 'POST', body });
  if (r.ok) {
    showMsg('msg-catalogue', 'success', 'Produit ajouté !');
    toggleForm('form-catalogue');
    loadCatalogue();
  } else { showMsg('msg-catalogue', 'error', 'Erreur lors de l\'ajout.'); }
}
</script>
</body>
</html>
